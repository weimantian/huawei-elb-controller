apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "huawei-elb-controller.fullname" . }}
  labels:
    {{- include "huawei-elb-controller.labels" . | nindent 4 }}
rules:
  # Watch, get, list, update LoadBalancerConfig CRs (cluster-scoped)
  - apiGroups: ["everest.percona.com"]
    resources: ["loadbalancerconfigs"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Read nodes for VPC/subnet auto-detection
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # Read endpoints for Local-traffic member filtering (externalTrafficPolicy: Local)
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list", "watch"]
  # Events for status reporting
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Read and patch Services for direct ELB API management (Plan B Service Reconciler)
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Update Service status (loadBalancer.ingress) for direct ELB API mode
  - apiGroups: [""]
    resources: ["services/status"]
    verbs: ["get", "update", "patch"]
  # Manage ELBBinding CRs for ELB state persistence
  - apiGroups: ["huawei-elb.io"]
    resources: ["elbbindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["huawei-elb.io"]
    resources: ["elbbindings/status"]
    verbs: ["get", "update", "patch"]
