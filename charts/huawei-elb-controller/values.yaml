# Image configuration
image:
  repository: huawei-elb-controller
  tag: latest
  pullPolicy: Always

# Image pull secrets for private registries (e.g. SWR)
imagePullSecrets: []
# - name: swr-secret

# Huawei Cloud credentials.
# Either set credentials directly here, or set existingSecret to use a
# pre-created Secret (recommended for production).
credentials:
  ak: ""
  sk: ""
  projectId: ""
  region: ""  # 必填！必须与你的 CCE 集群所在 region 一致，如 cn-north-4、sa-brazil-1

# Use an existing Secret for credentials instead of creating one.
# The Secret must have keys: ak, sk, project-id, region.
# If set, credentials.* values are ignored.
existingSecret: ""

# Deployment namespace (should match OpenEverest's namespace).
namespace: everest-system

# Resource limits
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Node scheduling
nodeSelector: {}
tolerations: []
affinity: {}

# Metrics endpoint
metrics:
  bindAddress: ":8081"

# Health probe settings (controller-runtime built-in /readyz and /healthz)
healthProbe:
  bindAddress: ":8082"
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    initialDelaySeconds: 15
    periodSeconds: 20

# Service Reconciler default parameters (Plan B).
# Used when a Service has no huawei-elb.io/* annotations (auto mode, no LBC).
defaults:
  public: true
  bandwidthSize: 10
  bandwidthChargeMode: "traffic"
  eipType: "5_bgp"
  bandwidthShareType: "PER"

# Webhook configuration
webhook:
  # Use cert-manager for production (recommended). When enabled, a Certificate
  # resource is created instead of the self-signed cert Job.
  certManager:
    enabled: false
    issuerName: ""
    issuerKind: "Issuer"
  # Self-signed cert generation Job image (used when certManager.enabled=false)
  certImage:
    repository: bitnami/kubectl
    tag: latest
    pullPolicy: IfNotPresent
