apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: elbbindings.huawei-elb.io
spec:
  group: huawei-elb.io
  names:
    kind: ELBBinding
    listKind: ELBBindingList
    plural: elbbindings
    singular: elbbinding
    shortNames:
      - elbb
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - serviceName
                - serviceUID
              properties:
                serviceName:
                  type: string
                  description: The owning Service name (same namespace). Immutable.
                serviceUID:
                  type: string
                  description: The owning Service UID. Guards against name reuse. Immutable.
            status:
              type: object
              properties:
                elbID:
                  type: string
                aclID:
                  type: string
                aclStatus:
                  type: string
                  enum:
                    - "on"
                    - "off"
                aclType:
                  type: string
                  enum:
                    - "white"
                lastKnownParams:
                  type: object
                  additionalProperties:
                    type: string
                ingressIP:
                  type: string
                phase:
                  type: string
                  enum:
                    - Provisioning
                    - Ready
                    - Deleting
                observedGeneration:
                  type: integer
                  format: int64
      additionalPrinterColumns:
        - name: Service
          type: string
          jsonPath: .spec.serviceName
        - name: ELB-ID
          type: string
          jsonPath: .status.elbID
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
