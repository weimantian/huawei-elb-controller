apiVersion: apps/v1
kind: Deployment
metadata:
  name: huawei-elb-controller
  namespace: everest-system
  labels:
    app: huawei-elb-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: huawei-elb-controller
  template:
    metadata:
      labels:
        app: huawei-elb-controller
    spec:
      serviceAccountName: huawei-elb-controller
      containers:
        - name: controller
          image: busybox:latest
          imagePullPolicy: IfNotPresent
          command: ["/huawei-elb-controller"]
          args:
            - --metrics-bind-address=:8081
          env:
            - name: HUAWEI_CLOUD_AK
              valueFrom:
                secretKeyRef:
                  name: huawei-cloud-credentials
                  key: ak
            - name: HUAWEI_CLOUD_SK
              valueFrom:
                secretKeyRef:
                  name: huawei-cloud-credentials
                  key: sk
            - name: HUAWEI_CLOUD_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: huawei-cloud-credentials
                  key: project-id
            - name: HUAWEI_CLOUD_REGION
              valueFrom:
                secretKeyRef:
                  name: huawei-cloud-credentials
                  key: region
            - name: SSL_CERT_FILE
              value: /etc/ssl/certs/ca-certificates.crt
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          ports:
            - name: metrics
              containerPort: 8081
              protocol: TCP
          volumeMounts:
            - name: controller-binary
              mountPath: /huawei-elb-controller
              readOnly: true
            - name: ca-certs
              mountPath: /etc/ssl/certs
              readOnly: true
      volumes:
        - name: controller-binary
          hostPath:
            path: /tmp/controller-binary
            type: File
        - name: ca-certs
          hostPath:
            path: /etc/ssl/certs
            type: Directory
