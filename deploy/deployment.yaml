apiVersion: apps/v1
kind: Deployment
metadata:
  name: huawei-elb-controller
  namespace: everest-system
  labels:
    app.kubernetes.io/name: huawei-elb-controller
    app.kubernetes.io/instance: huawei-elb-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: huawei-elb-controller
      app.kubernetes.io/instance: huawei-elb-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: huawei-elb-controller
        app.kubernetes.io/instance: huawei-elb-controller
    spec:
      serviceAccountName: huawei-elb-controller
      containers:
        - name: controller
          image: <swr-registry>/huawei-elb-controller:latest
          imagePullPolicy: Always
          args:
            - --metrics-bind-address=:8081
          env:
            - name: HUAWEI_CLOUD_AK
              valueFrom:
                secretKeyRef:
                  name: huawei-cloud-credentials
                  key: ak
            - name: HUAWEI_CLOUD_SK
              valueFrom:
                secretKeyRef:
                  name: huawei-cloud-credentials
                  key: sk
            - name: HUAWEI_CLOUD_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: huawei-cloud-credentials
                  key: project-id
            - name: HUAWEI_CLOUD_REGION
              valueFrom:
                secretKeyRef:
                  name: huawei-cloud-credentials
                  key: region
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          ports:
            - name: metrics
              containerPort: 8081
              protocol: TCP
            - name: health
              containerPort: 8082
              protocol: TCP
            - name: webhook
              containerPort: 9443
              protocol: TCP
          volumeMounts:
            - name: webhook-certs
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20

      volumes:
        - name: webhook-certs
          secret:
            secretName: huawei-elb-controller-webhook-tls
            defaultMode: 420
