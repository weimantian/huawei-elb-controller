---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: huawei-elb-controller-webhook
  labels:
    app.kubernetes.io/name: huawei-elb-controller
webhooks:
  - name: service.elb.huawei-webhook.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    timeoutSeconds: 5
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["services"]
        operations: ["CREATE"]
        scope: "*"
    # Only intercept Services in the everest namespace (where OpenEverest
    # creates database LB Services). Other namespaces are unaffected.
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: everest
    clientConfig:
      service:
        name: huawei-elb-controller-webhook
        namespace: everest-system
        path: /mutate-v1-service
        port: 443
---
apiVersion: v1
kind: Service
metadata:
  name: huawei-elb-controller-webhook
  namespace: everest-system
  labels:
    app.kubernetes.io/name: huawei-elb-controller
spec:
  selector:
    app.kubernetes.io/name: huawei-elb-controller
  ports:
    - name: webhook
      port: 443
      targetPort: 9443
      protocol: TCP
