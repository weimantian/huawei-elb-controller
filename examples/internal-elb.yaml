apiVersion: everest.percona.com/v1alpha1
kind: LoadBalancerConfig
metadata:
  name: huawei-internal-elb
spec:
  annotations:
    # --- Required (controller reads these to create the ELB) ---
    huawei-elb.io/vpc-id: "REPLACE_WITH_VPC_ID"
    # NOTE: Use the Neutron subnet ID (SubnetCidr.Id from VPC v3 API), not the VPC subnet resource ID.
    # Run 'go run ./cmd/list-vpcs' to find it.
    huawei-elb.io/subnet-id: "REPLACE_WITH_NEUTRON_SUBNET_ID"
    huawei-elb.io/availability-zones: "cn-north-4a,cn-north-4b"
    # --- Internal ELB (no public IP) ---
    huawei-elb.io/public: "false"
    # Controller will add: kubernetes.io/elb.id: <elb-uuid>
